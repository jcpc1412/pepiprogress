name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint (incl. no-hardcoded-string guardrail)
        run: npm run lint
      - name: i18n key parity (all 6 locales in lockstep)
        run: npm run i18n:check
